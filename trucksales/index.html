<div id="content-container">
    <div id="updates-container">
        <table id="updates-table">
            <thead>
                <tr>
                    <th>Geography</th>
                    <th>Latest data</th>

	<div class="selector-container">
	  <div class="selector">
		<label for="langSelector" class="icon-translate">Chart Language</label>
			<select id="langSelector">
			  <option value="da">Dansk</option>
			  <option value="de">Deutsch</option>
			  <option value="en" selected>English</option>
			  <option value="es">Español</option>
			  <option value="fi">Suomi</option>
			  <option value="fr">Français</option>
			  <option value="it">Italiano</option>
			  <option value="ja">日本語</option>
			  <option value="ko">한국어</option>
			  <option value="no">Norsk (bokmål)</option>
			  <option value="pl">Polski</option>
			  <option value="sv">Svenska</option>
			  <option value="zh">中文</option>
			</select>
	  </div>

	  <div class="selector">
		<label for="frequencySelector">Time Interval</label>
		<select id="frequencySelector">
		  <option value="monthly">Monthly</option>
		  <option value="quarterly">Quarterly</option>
		  <option value="half-yearly">Half-yearly</option>
		  <option value="annual">Annual</option>
		</select>
	  </div>

	  <div class="selector">
		<label for="formatSelector">Display Format</label>
		<select id="formatSelector">
		  <option value="relative">Relative (%)</option>
		  <option value="absolute">Absolute (Units)</option>
		  <option value="line">Line Chart</option>
		</select>
	  </div>

	  <div class="selector">
		<label for="sortSelector">Sort Order</label>
		<select id="sortSelector">
		  <option value="alphabetical">Alphabetical</option>
		  <option value="bev-share">BEV share</option>
		  <option value="last-updated">Last updated</option>
		</select>
	  </div>
  
	  <div class="selector">
	    <label for="countrySelector">Select Countries (<span id="selectedCount">0</span>/<span id="totalCount">0</span>)</label>
	    <select id="countrySelector" multiple>
	    </select>
	  </div>
	</div>

	<div class="pure-g">
	</div>

<script>
const DATASET = 'trucksales';

// Granular debug controls
const DEBUG_CONFIG = {
    spinner: false,   // Only see logs related to the loader/spinner
    charts: false,   // Hide chart-loading logs
    general: true   // Hide everything else
};

// Updated wrapper function
function log(category, ...args) {
    if (DEBUG_CONFIG[category]) {
        console.log(`[${category.toUpperCase()}]`, ...args);
    }
}
</script>
